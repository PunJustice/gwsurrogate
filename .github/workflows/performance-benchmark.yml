name: GWSurrogate Performance Benchmark

on:
  workflow_dispatch:
    inputs:
      compare_ref:
        description: "Optional git ref to compare against, e.g. testing or pull/70/head"
        required: false
        default: ""
      compare_label:
        description: "Optional display label for the comparison ref, e.g. PR-70"
        required: false
        default: ""
      repeat:
        description: "Number of timing repeats per benchmark case"
        required: true
        default: "5"
      number:
        description: "Model evaluations per timing repeat"
        required: true
        default: "3"
      profile_limit:
        description: "Number of cProfile rows per benchmark case"
        required: true
        default: "40"
      archive_report:
        description: "Save this benchmark report to the historical GitHub Pages archive"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      archive_label:
        description: "Optional label for archived report, e.g. NumPy 2 migration baseline"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -yq install gcc libgsl-dev

      - name: Cache surrogate downloads
        uses: actions/cache@v4
        with:
          path: gwsurrogate/surrogate_downloads
          key: surrogate-downloads-${{ runner.os }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel requests pytest
          python -m pip install -e .

      - name: Build C extensions in place
        run: |
          python setup.py build_ext --inplace

      - name: Show benchmark environment
        run: |
          python --version
          python -m pip list
          echo "GSL version..."
          gsl-config --version

      - name: Run benchmark
        env:
          COMPARE_REF: ${{ inputs.compare_ref }}
          COMPARE_LABEL: ${{ inputs.compare_label }}
          REPEAT: ${{ inputs.repeat }}
          NUMBER: ${{ inputs.number }}
          PROFILE_LIMIT: ${{ inputs.profile_limit }}
        run: |
          set -euo pipefail

          if [ -z "$COMPARE_REF" ]; then
            python test/benchmark_surrogate_evaluations.py \
              --repeat "$REPEAT" \
              --number "$NUMBER" \
              --profile-limit "$PROFILE_LIMIT"
          else
            label="$COMPARE_LABEL"
            if [ -z "$label" ]; then
              label="$COMPARE_REF"
            fi

            python test/benchmark_surrogate_evaluations.py \
              --fetch-ref "$COMPARE_REF" \
              --compare-ref FETCH_HEAD \
              --compare-label "$label" \
              --repeat "$REPEAT" \
              --number "$NUMBER" \
              --profile-limit "$PROFILE_LIMIT"
          fi

      - name: Upload benchmark outputs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            test/benchmark_surrogate_evaluations.json
            test/benchmark_surrogate_evaluations.md
            test/benchmark_surrogate_evaluations.png
            test/benchmark_surrogate_evaluations.html

      - name: Prepare GitHub Pages site
        env:
          ARCHIVE_REPORT: ${{ inputs.archive_report }}
          ARCHIVE_LABEL: ${{ inputs.archive_label }}
          COMPARE_REF: ${{ inputs.compare_ref }}
          COMPARE_LABEL: ${{ inputs.compare_label }}
        run: |
          set -euo pipefail

          rm -rf _pages _site

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git worktree add _pages FETCH_HEAD
          else
            mkdir -p _pages
            git -C _pages init
            git -C _pages checkout -b gh-pages
            git -C _pages remote add origin "$(git remote get-url origin)"
          fi

          export RUN_ID="$(date -u +'%Y-%m-%d-%H%M%S')-${GITHUB_RUN_NUMBER}"
          python .github/scripts/prepare_benchmark_pages.py

      - name: Commit archived benchmark report
        if: ${{ inputs.archive_report == 'true' }}
        run: |
          set -euo pipefail

          git -C _pages config user.name "github-actions[bot]"
          git -C _pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C _pages add -A
          git -C _pages commit -m "Archive benchmark report ${GITHUB_RUN_NUMBER}"
          git -C _pages push origin HEAD:gh-pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
